<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <rect width="900" height="380" fill="#f8f4eb"/>
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="600" fill="#111">达·芬奇视觉思考方法</text>
  
  <circle cx="180" cy="140" r="52" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="180" y="135" text-anchor="middle" font-size="14" fill="#111">观察</text>
  <text x="180" y="155" text-anchor="middle" font-size="11" fill="#5f5a52">Drawing as seeing</text>
  
  <circle cx="450" cy="140" r="52" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-size="14" fill="#111">记录</text>
  <text x="450" y="155" text-anchor="middle" font-size="11" fill="#5f5a52">Notes as thinking</text>
  
  <circle cx="720" cy="140" r="52" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="720" y="135" text-anchor="middle" font-size="14" fill="#111">连接</text>
  <text x="720" y="155" text-anchor="middle" font-size="11" fill="#5f5a52">Recomposition</text>
  
  <line x1="232" y1="140" x2="398" y2="140" stroke="#8B4513" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="502" y1="140" x2="668" y2="140" stroke="#8B4513" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="120" y="230" width="220" height="110" rx="8" fill="#fff" stroke="#111" stroke-width="1.5"/>
  <text x="230" y="265" text-anchor="middle" font-size="13" fill="#111">画图是思考</text>
  <text x="230" y="285" text-anchor="middle" font-size="12" fill="#5f5a52">不是记录，而是</text>
  <text x="230" y="302" text-anchor="middle" font-size="12" fill="#5f5a52">生成理解的过程</text>
  
  <rect x="350" y="230" width="220" height="110" rx="8" fill="#fff" stroke="#111" stroke-width="1.5"/>
  <text x="460" y="265" text-anchor="middle" font-size="13" fill="#111">笔记是思想</text>
  <text x="460" y="285" text-anchor="middle" font-size="12" fill="#5f5a52">不是结果记录，</text>
  <text x="460" y="302" text-anchor="middle" font-size="12" fill="#5f5a52">而是思维的延续</text>
  
  <rect x="580" y="230" width="220" height="110" rx="8" fill="#fff" stroke="#111" stroke-width="1.5"/>
  <text x="690" y="265" text-anchor="middle" font-size="13" fill="#111">知识是关系</text>
  <text x="690" y="285" text-anchor="middle" font-size="12" fill="#5f5a52">好的研究工具</text>
  <text x="690" y="302" text-anchor="middle" font-size="12" fill="#5f5a52">帮助建立连接</text>
</svg>