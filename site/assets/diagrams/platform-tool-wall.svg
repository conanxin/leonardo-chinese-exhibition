<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" role="img" aria-labelledby="ptw-title ptw-desc">
  <title id="ptw-title">Leonardo//thek@ 九功能工具墙</title>
  <desc id="ptw-desc">九个功能模块：Foliations, Subject Indexes, Photographic Plates, Lexicon, Watermarks, Recompositions, Bibliography, Advanced Search, Comparative Study.</desc>

  <rect width="880" height="460" fill="#fbfaf6"/>

  <g font-family="'Inter', 'Helvetica Neue', sans-serif">
    <text x="60" y="48" font-size="18" font-weight="600" fill="#1a1a1a">Leonardo//thek@ 工具墙</text>
    <text x="60" y="72" font-size="12" fill="#5b5b5b">九个功能模块构成的"反向拆散"工作面</text>
  </g>

  <g font-family="'Inter', 'Helvetica Neue', sans-serif" fill="#2a2a2a" font-size="13">
    <!-- 3x3 grid -->
    <g id="tool-1">
      <rect x="60" y="110" width="240" height="100" fill="#fffefb" stroke="#cfc8b8" stroke-width="1"/>
      <text x="76" y="138" font-weight="600">Foliations</text>
      <text x="76" y="158" font-size="11" fill="#5b5b5b">页码重建 · 基于笔触、折痕、装订孔</text>
      <text x="76" y="178" font-size="10" fill="#1f3a2e">把"页码"作为证据</text>
    </g>
    <g id="tool-2">
      <rect x="320" y="110" width="240" height="100" fill="#fffefb" stroke="#cfc8b8" stroke-width="1"/>
      <text x="336" y="138" font-weight="600">Subject Indexes</text>
      <text x="336" y="158" font-size="11" fill="#5b5b5b">主题索引 · 跨手稿·按主题词检索</text>
      <text x="336" y="178" font-size="10" fill="#1f3a2e">主题是另一种拼合线</text>
    </g>
    <g id="tool-3">
      <rect x="580" y="110" width="240" height="100" fill="#fffefb" stroke="#cfc8b8" stroke-width="1"/>
      <text x="596" y="138" font-weight="600">Photographic Plates</text>
      <text x="596" y="158" font-size="11" fill="#5b5b5b">高清图像库 · 数字化基底</text>
      <text x="596" y="178" font-size="10" fill="#1f3a2e">图像先于索引</text>
    </g>

    <g id="tool-4">
      <rect x="60" y="226" width="240" height="100" fill="#fffefb" stroke="#cfc8b8" stroke-width="1"/>
      <text x="76" y="254" font-weight="600">Lexicon</text>
      <text x="76" y="274" font-size="11" fill="#5b5b5b">术语库 · 专业词汇 + 转写</text>
      <text x="76" y="294" font-size="10" fill="#1f3a2e">学术语言基础设施</text>
    </g>
    <g id="tool-5">
      <rect x="320" y="226" width="240" height="100" fill="#1f3a2e" stroke="#1f3a2e" stroke-width="1"/>
      <text x="336" y="254" font-weight="600" fill="#fbfaf6">Watermarks</text>
      <text x="336" y="274" font-size="11" fill="#e9e3d2">水印库 · 造纸厂年代指纹</text>
      <text x="336" y="294" font-size="10" fill="#9a7b3b">本展重点</text>
    </g>
    <g id="tool-6">
      <rect x="580" y="226" width="240" height="100" fill="#1f3a2e" stroke="#1f3a2e" stroke-width="1"/>
      <text x="596" y="254" font-weight="600" fill="#fbfaf6">Recompositions</text>
      <text x="596" y="274" font-size="11" fill="#e9e3d2">复原拼合 · 虚拟笔记本</text>
      <text x="596" y="294" font-size="10" fill="#9a7b3b">本展重点</text>
    </g>

    <g id="tool-7">
      <rect x="60" y="342" width="240" height="100" fill="#fffefb" stroke="#cfc8b8" stroke-width="1"/>
      <text x="76" y="370" font-weight="600">Bibliography</text>
      <text x="76" y="390" font-size="11" fill="#5b5b5b">研究文献 · 引用与延伸</text>
      <text x="76" y="410" font-size="10" fill="#1f3a2e">学术闭环</text>
    </g>
    <g id="tool-8">
      <rect x="320" y="342" width="240" height="100" fill="#fffefb" stroke="#cfc8b8" stroke-width="1"/>
      <text x="336" y="370" font-weight="600">Advanced Search</text>
      <text x="336" y="390" font-size="11" fill="#5b5b5b">高级检索 · 跨字段组合筛选手稿</text>
      <text x="336" y="410" font-size="10" fill="#1f3a2e">研究者工作面</text>
    </g>
    <g id="tool-9">
      <rect x="580" y="342" width="240" height="100" fill="#fffefb" stroke="#cfc8b8" stroke-width="1"/>
      <text x="596" y="370" font-weight="600">Comparative Study</text>
      <text x="596" y="390" font-size="11" fill="#5b5b5b">对比研究 · 双图并置</text>
      <text x="596" y="410" font-size="10" fill="#1f3a2e">视觉法证</text>
    </g>
  </g>

  <!-- footer -->
  <g font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#7a7a7a">
    <text x="60" y="456">示意图 · v1.7 · 9 模块的功能墙，本展重点：Watermarks 与 Recompositions</text>
  </g>
</svg>
