<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" role="img" aria-labelledby="wec-title wec-desc">
  <title id="wec-title">水印证据链图</title>
  <desc id="wec-desc">纸张、水印、纤维、裁切边缘、折痕和页码共同形成"复原判断"的证据链。</desc>

  <rect width="880" height="360" fill="#fbfaf6"/>

  <g font-family="'Inter', 'Helvetica Neue', sans-serif">
    <text x="60" y="48" font-size="18" font-weight="600" fill="#1a1a1a">水印与纸张证据链</text>
    <text x="60" y="72" font-size="12" fill="#5b5b5b">复原不是靠"看着像"，是靠证据同向</text>
  </g>

  <!-- 4 evidence bars feeding into central node -->
  <g font-family="'Inter', 'Helvetica Neue', sans-serif" fill="#2a2a2a" font-size="12">
    <!-- 1 水印 -->
    <g>
      <rect x="60" y="120" width="180" height="38" fill="#fffefb" stroke="#cfc8b8" stroke-width="1"/>
      <text x="76" y="143">水印 · watermark</text>
      <text x="76" y="158" font-size="10" fill="#7a7a7a">造纸厂唯一的"指纹"</text>
    </g>
    <!-- 2 纤维 -->
    <g>
      <rect x="60" y="180" width="180" height="38" fill="#fffefb" stroke="#cfc8b8" stroke-width="1"/>
      <text x="76" y="203">纸张纤维 · fibre</text>
      <text x="76" y="218" font-size="10" fill="#7a7a7a">麻 / 棉 / 早期纸</text>
    </g>
    <!-- 3 裁切边缘 -->
    <g>
      <rect x="60" y="240" width="180" height="38" fill="#fffefb" stroke="#cfc8b8" stroke-width="1"/>
      <text x="76" y="263">裁切边缘 · cut</text>
      <text x="76" y="278" font-size="10" fill="#7a7a7a">莱奥尼剪刀的痕迹</text>
    </g>
    <!-- 4 折痕 -->
    <g>
      <rect x="60" y="300" width="180" height="38" fill="#fffefb" stroke="#cfc8b8" stroke-width="1"/>
      <text x="76" y="323">折痕 / 装订孔</text>
      <text x="76" y="338" font-size="10" fill="#7a7a7a">原始笔记本的物理痕迹</text>
    </g>
  </g>

  <!-- arrows converge -->
  <g stroke="#9a7b3b" stroke-width="1.4" fill="none">
    <path d="M 240 139 C 320 139, 360 220, 440 220"/>
    <path d="M 240 199 C 320 199, 360 220, 440 220"/>
    <path d="M 240 259 C 320 259, 360 220, 440 220"/>
    <path d="M 240 319 C 320 319, 360 220, 440 220"/>
  </g>

  <!-- convergence box -->
  <g font-family="'Inter', 'Helvetica Neue', sans-serif">
    <rect x="440" y="190" width="220" height="60" fill="#1f3a2e"/>
    <text x="550" y="216" text-anchor="middle" font-size="14" fill="#fbfaf6" font-weight="600">同向证据</text>
    <text x="550" y="238" text-anchor="middle" font-size="11" fill="#e9e3d2">判断两张纸是否属同一笔记本</text>
  </g>

  <!-- output box -->
  <g font-family="'Inter', 'Helvetica Neue', sans-serif">
    <line x1="660" y1="220" x2="730" y2="220" stroke="#1f3a2e" stroke-width="1.4" marker-end="url(#wec-arrow)"/>
    <defs>
      <marker id="wec-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f3a2e"/>
      </marker>
    </defs>
    <rect x="730" y="190" width="110" height="60" fill="#fffefb" stroke="#1f3a2e" stroke-width="1.4"/>
    <text x="785" y="216" text-anchor="middle" font-size="13" fill="#1f3a2e" font-weight="600">复原</text>
    <text x="785" y="236" text-anchor="middle" font-size="11" fill="#5b5b5b">法证结论</text>
  </g>

  <!-- footer -->
  <g font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#7a7a7a">
    <text x="60" y="358">示意图 · v1.7 · 不靠"看着像"做复原</text>
  </g>
</svg>
