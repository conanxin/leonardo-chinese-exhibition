name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build combined staging artifact (v5.3 controlled deploy)
        run: |
          python3 scripts/second_exhibition_staging_build.py \
            --output "${{ runner.temp }}/leonardo-pages-artifact" \
            --audit "${{ runner.temp }}/leonardo-pages-artifact-audit"
      - name: Run staging gate (v5.3 controlled deploy)
        run: |
          python3 scripts/second_exhibition_staging_gate.py \
            --artifact "${{ runner.temp }}/leonardo-pages-artifact" \
            --audit "${{ runner.temp }}/leonardo-pages-artifact-audit"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/leonardo-pages-artifact
      - id: deployment
        uses: actions/deploy-pages@v4
